version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: road_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # ── Django Application ────────────────────────────
  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  # ── Redis (future: caching + celery) ─────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_data:
